name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build
        working-directory: src
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p bin
          go mod tidy
          go build -ldflags "-X github.com/llm-net/adbclaw/cmd.Version=${VERSION}" \
            -o "bin/adbclaw-${{ matrix.goos }}-${{ matrix.goarch }}" .

      - uses: actions/upload-artifact@v4
        with:
          name: adbclaw-${{ matrix.goos }}-${{ matrix.goarch }}
          path: src/bin/adbclaw-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect binaries
        run: |
          mkdir -p release
          find artifacts -type f -name 'adbclaw-*' -exec cp {} release/ \;
          chmod +x release/*
          ls -lh release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
